name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Fix Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          # Download wrapper jar from gradle release
          curl -sL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/nicnocquee/gradle-wrapper-jars/raw/main/gradle-8.5/gradle-wrapper.jar"
          chmod +x gradlew
          ls -la gradle/wrapper/
          
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-cache-85
          restore-keys: ${{ runner.os }}-gradle-
          
      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -40
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
